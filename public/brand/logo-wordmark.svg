<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" role="img" aria-label="English Notehub">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="420" height="96" rx="20" fill="#f8fafc"/>
  <g transform="translate(10,8)">
    <!-- Icon background -->
    <rect width="80" height="80" rx="18" fill="url(#wg)"/>
    <!-- Open book -->
    <path d="M40 18 C34 18 27 17 22 15 L22 50 C27 51.5 34 52.5 40 52.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M40 18 C46 18 53 17 58 15 L58 50 C53 51.5 46 52.5 40 52.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="40" y1="18" x2="40" y2="52.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Page lines -->
    <line x1="27" y1="27" x2="36" y2="27.8" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="26.5" y1="33" x2="36" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="26" y1="39" x2="36" y2="40.2" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Speech bubble -->
    <rect x="45" y="23" width="16" height="14" rx="3.5" fill="white"/>
    <polygon points="49,37 52,42 53.5,37" fill="white"/>
    <text x="53" y="31.5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#14b8a6" text-anchor="middle" dominant-baseline="central">A</text>
  </g>
  <text x="108" y="44" fill="#0f172a" font-family="Poppins, Segoe UI, sans-serif" font-size="28" font-weight="700">ENGLISH</text>
  <text x="108" y="72" fill="url(#wg)" font-family="Poppins, Segoe UI, sans-serif" font-size="28" font-weight="700">NOTEHUB</text>
</svg>
