<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Gradient background -->
  <rect width="512" height="512" rx="110" fill="url(#g)"/>
  <!-- Open book – left page -->
  <path d="M256 140 C220 140 160 132 120 120 L120 340 C160 350 220 356 256 356" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Open book – right page -->
  <path d="M256 140 C292 140 352 132 392 120 L392 340 C352 350 292 356 256 356" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Book spine -->
  <line x1="256" y1="140" x2="256" y2="356" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Page lines left -->
  <line x1="160" y1="190" x2="230" y2="195" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="155" y1="225" x2="230" y2="232" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="150" y1="260" x2="230" y2="268" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- Speech bubble with A -->
  <rect x="300" y="170" width="80" height="72" rx="16" fill="white"/>
  <polygon points="320,242 336,262 340,242" fill="white"/>
  <text x="340" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#14b8a6" text-anchor="middle" dominant-baseline="central">A</text>
</svg>
